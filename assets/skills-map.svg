<svg width="1600" height="760" viewBox="0 0 1600 760" fill="none" xmlns="http://www.w3.org/2000/svg">
  <rect width="1600" height="760" rx="32" fill="#090909"/>
  <text x="86" y="106" fill="#F6D16A" font-family="Arial, Helvetica, sans-serif" font-size="56" font-weight="700">Skill map</text>
  <text x="86" y="152" fill="#A89A80" font-family="Arial, Helvetica, sans-serif" font-size="24">Three public skills, each aimed at a real Zcash agent workflow</text>
  <g stroke="#2A2418">
    <rect x="90" y="220" width="440" height="340" rx="24" fill="#111111"/>
    <rect x="580" y="220" width="440" height="340" rx="24" fill="#111111"/>
    <rect x="1070" y="220" width="440" height="340" rx="24" fill="#111111"/>
  </g>
  <text x="128" y="290" fill="#F5E7C6" font-family="Arial, Helvetica, sans-serif" font-size="38" font-weight="700">Build</text>
  <text x="128" y="340" fill="#C6B08A" font-family="Arial, Helvetica, sans-serif" font-size="28">$zcash-dev</text>
  <text x="128" y="388" fill="#8C816A" font-family="Arial, Helvetica, sans-serif" font-size="21">Apps, services, wallet flows,</text>
  <text x="128" y="420" fill="#8C816A" font-family="Arial, Helvetica, sans-serif" font-size="21">RPC integration, testing,</text>
  <text x="128" y="452" fill="#8C816A" font-family="Arial, Helvetica, sans-serif" font-size="21">and Zcash developer architecture.</text>
  <text x="618" y="290" fill="#F5E7C6" font-family="Arial, Helvetica, sans-serif" font-size="38" font-weight="700">Operate</text>
  <text x="618" y="340" fill="#C6B08A" font-family="Arial, Helvetica, sans-serif" font-size="28">$zcash-node-ops</text>
  <text x="618" y="388" fill="#8C816A" font-family="Arial, Helvetica, sans-serif" font-size="21">Install, run, inspect,</text>
  <text x="618" y="420" fill="#8C816A" font-family="Arial, Helvetica, sans-serif" font-size="21">sync, log-debug, and recover</text>
  <text x="618" y="452" fill="#8C816A" font-family="Arial, Helvetica, sans-serif" font-size="21">Zcash full nodes safely.</text>
  <text x="1108" y="290" fill="#F5E7C6" font-family="Arial, Helvetica, sans-serif" font-size="38" font-weight="700">Support</text>
  <text x="1108" y="340" fill="#C6B08A" font-family="Arial, Helvetica, sans-serif" font-size="28">$zcash-wallet-support</text>
  <text x="1108" y="388" fill="#8C816A" font-family="Arial, Helvetica, sans-serif" font-size="21">Wallet choice, receiving, sending,</text>
  <text x="1108" y="420" fill="#8C816A" font-family="Arial, Helvetica, sans-serif" font-size="21">address compatibility, backups,</text>
  <text x="1108" y="452" fill="#8C816A" font-family="Arial, Helvetica, sans-serif" font-size="21">and user privacy gotchas.</text>
</svg>
